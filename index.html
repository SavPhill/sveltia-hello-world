<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Boutique Resort</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <style>
    :root { 
      --primary: #1e2d24; /* Deep, luxury botanical green */
      --accent: #c5a880;  /* Sophisticated gold/champagne accent */
      --dark: #1a1a1a; 
      --light: #fcfbfa;   /* Creamy soft off-white */
      --muted: #6e726e;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--light); color: var(--dark); line-height: 1.7; -webkit-font-smoothing: antialiased; }
    
    /* Luxury Navbar */
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; background: transparent; position: absolute; top: 0; left: 0; width: 100%; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { font-family: 'Playfair Display', serif; color: white; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
    
    /* Hero Section */
    header { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 2rem; background-size: cover; background-position: center; position: relative; }
    header::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 100%); z-index: 1; }
    header * { position: relative; z-index: 2; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 400; letter-spacing: -1px; margin-bottom: 1rem; max-width: 900px; }
    header p { font-size: 1.25rem; font-weight: 300; letter-spacing: 1px; max-width: 600px; margin-bottom: 2.5rem; color: rgba(255,255,255,0.9); }
    
    /* Elegant Buttons */
    .btn { display: inline-block; background-color: var(--accent); color: var(--primary); padding: 1rem 2.5rem; text-decoration: none; font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; border-radius: 0; transition: all 0.4s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn:hover { background-color: white; color: var(--dark); transform: translateY(-2px); }
    
    /* Standard Layout Containers */
    .section-pad { padding: 7rem 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 400; text-align: center; color: var(--primary); margin-bottom: 1rem; }
    .section-subtitle { text-align: center; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 4rem; font-weight: 500; }
    
    /* Editorial Intro Section */
    .intro-block { max-width: 800px; margin: 0 auto; text-align: center; font-family: 'Playfair Display', serif; font-size: 1.6rem; line-height: 2; color: #3a403a; font-style: italic; }
    
    /* Premium Amenities Grid */
    .amenities-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; }
    .amenity-card { text-align: center; padding: 2.5rem 1.5rem; background: white; border: 1px solid rgba(0,0,0,0.03); transition: all 0.3s ease; }
    .amenity-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(30,45,36,0.05); }
    .amenity-card h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--primary); margin-bottom: 0.75rem; font-weight: 400; }
    .amenity-card p { font-size: 0.95rem; color: var(--muted); }
    
    /* Luxury Rooms Grid Layout */
    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 3.5rem; }
    .room-card { background: white; overflow: hidden; border-radius: 0; transition: all 0.4s ease; display: flex; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
    .room-card:hover { box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .room-img-wrapper { width: 100%; height: 320px; overflow: hidden; position: relative; }
    .room-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .room-card:hover img { transform: scale(1.05); }
    .room-details { padding: 2.5rem; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #f0ede9; border-top: none; }
    .room-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; border-bottom: 1px solid #f0ede9; padding-bottom: 1rem; }
    .room-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--primary); font-weight: 400; }
    .room-price { font-size: 1.1rem; color: var(--accent); font-weight: 500; }
    .room-desc { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.8; }
    .room-guests { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #999; }
    
    /* Footer styling */
    footer { background: var(--primary); color: white; padding: 4rem 2rem; text-align: center; font-size: 0.9rem; font-weight: 300; letter-spacing: 1px; }
    footer p { color: rgba(255,255,255,0.6); margin-top: 1rem; }
    
    @media (max-width: 768px) {
      header h1 { font-size: 2.5rem; }
      nav { padding: 1.5rem 2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo" id="nav-logo">Resort</div>
    <div></div> </nav>

  <header id="hero" style="background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80');">
    <h1 id="hotel-name">Loading Sanctuary...</h1>
    <p id="hero-headline"></p>
    <a href="#" id="booking-btn" class="btn" target="_blank">Reserve Your Stay</a>
  </header>

  <section class="section-pad" style="background-color: #fff;">
    <div class="container">
      <div id="intro-text" class="intro-block"></div>
    </div>
  </section>

  <section class="section-pad" style="background-color: var(--light); border-top: 1px solid #f0ede9;">
    <div class="container">
      <h2 class="section-title">The Resort Experience</h2>
      <div class="section-subtitle">Curated Luxury & Wellness</div>
      <div id="amenities-container" class="amenities-grid"></div>
    </div>
  </section>

  <section class="section-pad" style="background-color: #fff; border-top: 1px solid #f0ede9;">
    <div class="container">
      <h2 class="section-title">Accommodations</h2>
      <div class="section-subtitle">Sanctuaries of Absolute Comfort</div>
      <div id="rooms-container" class="rooms-grid"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p id="footer-contact"></p>
      <p style="font-size:0.75rem; opacity:0.4; margin-top:3rem;">&copy; 2026 Collective Luxury Architecture. Securely Delivered.</p>
    </div>
  </footer>

  <script>
    async function loadHotelData() {
      try {
        const response = await fetch('/homepage.json');
        const data = await response.json();

        // Inject Core Identity / Hero Details
        document.getElementById('hotel-name').innerText = data.hotel_name || "Boutique Resort";
        document.getElementById('nav-logo').innerText = data.hotel_name || "Resort";
        document.getElementById('hero-headline').innerText = data.hero_headline || "";
        
        if(data.hero_image) {
          document.getElementById('hero').style.backgroundImage = `url('${data.hero_image}')`;
        }
        if(data.booking_url) {
          document.getElementById('booking-btn').href = data.booking_url;
        }

        // Render Editorial Copy
        document.getElementById('intro-text').innerHTML = `&ldquo;${data.intro_text || ""}&rdquo;`;

        // Render Luxury Amenities Dynamic Grid
        const amenitiesContainer = document.getElementById('amenities-container');
        amenitiesContainer.innerHTML = (data.amenities || []).map(amenity => `
          <div class="amenity-card">
            <h3>${amenity.title}</h3>
            <p>${amenity.description}</p>
          </div>
        `).join('');

        // Render Luxury Rooms Portfolio
        const roomsContainer = document.getElementById('rooms-container');
        roomsContainer.innerHTML = (data.rooms || []).map(room => `
          <div class="room-card">
            <div class="room-img-wrapper">
              <img src="${room.photo || 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=800&q=80'}" alt="${room.room_name}">
            </div>
            <div class="room-details">
              <div>
                <div class="room-meta">
                  <h3 class="room-title">${room.room_name}</h3>
                  <span class="room-price">THB ${room.price} <span style="font-size:0.75rem; color:#999; font-weight:300;">/ night</span></span>
                </div>
                <p class="room-desc">${room.description || ''}</p>
              </div>
              <div class="room-guests">Accommodates up to ${room.guests || 2} Guests</div>
            </div>
          </div>
        `).join('');

        // Setup Clean Footer Contact Links
        document.getElementById('footer-contact').innerHTML = `
          T: ${data.phone || ''} &nbsp;&middot;&nbsp; E: ${data.email || ''}
        `;

      } catch (error) {
        console.error("Pipeline Sync Error:", error);
      }
    }

    window.addEventListener('DOMContentLoaded', loadHotelData);
  </script>

</body>
</html>
