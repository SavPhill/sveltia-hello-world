<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Boutique Resort</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <style type="text/theme">
    @theme {
      --color-resort-green: #1e2d24;
      --color-resort-gold: #c5a880;
      --color-resort-cream: #fcfbfa;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="font-sans bg-resort-cream text-neutral-900 antialiased selection:bg-resort-gold selection:text-resort-green">

  <nav class="absolute top-0 left-0 w-full z-10 flex justify-between items-center px-6 md:px-16 py-6 border-b border-white/10">
    <div class="font-serif text-white text-xl tracking-[0.2em] uppercase font-semibold" id="nav-logo">Resort</div>
    <div></div>
  </nav>

  <header id="hero" class="relative h-[90vh] flex flex-col justify-center items-center text-center px-4 bg-cover bg-center before:content-[''] before:absolute before:inset-0 before:bg-gradient-to-b before:from-black/40 before:to-black/60 before:z-1">
    <h1 id="hotel-name" class="relative z-2 font-serif text-white text-4xl md:text-6xl font-normal tracking-tight mb-4 max-w-4xl">Loading Sanctuary...</h1>
    <p id="hero-headline" class="relative z-2 text-white/90 text-lg md:text-xl font-light tracking-wide max-w-xl mb-10"></p>
    <a href="#" id="booking-btn" class="relative z-2 inline-block bg-resort-gold text-resort-green px-10 py-4 text-xs font-medium uppercase tracking-[0.2em] shadow-xl hover:bg-white hover:text-neutral-900 transition-all duration-300 hover:-translate-y-0.5" target="_blank">Reserve Your Stay</a>
  </header>

  <section class="py-24 md:py-32 bg-white px-6">
    <div class="max-w-4xl mx-auto text-center font-serif text-2xl md:text-3xl leading-relaxed text-neutral-800 italic" id="intro-text"></div>
  </section>

  <section class="py-24 md:py-32 bg-resort-cream border-t border-neutral-200/50 px-6">
    <div class="max-w-7xl mx-auto">
      <h2 class="font-serif text-4xl font-normal text-center text-resort-green mb-2">The Resort Experience</h2>
      <div class="text-center text-xs font-medium uppercase tracking-[0.25em] text-resort-gold mb-16">Curated Luxury & Wellness</div>
      <div id="amenities-container" class="grid grid-cols-1 md:grid-cols-3 gap-12"></div>
    </div>
  </section>

  <section class="py-24 md:py-32 bg-white border-t border-neutral-200/50 px-6">
    <div class="max-w-7xl mx-auto">
      <h2 class="font-serif text-4xl font-normal text-center text-resort-green mb-2">Accommodations</h2>
      <div class="text-center text-xs font-medium uppercase tracking-[0.25em] text-resort-gold mb-16">Sanctuaries of Absolute Comfort</div>
      <div id="rooms-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-14"></div>
    </div>
  </section>

  <footer class="bg-resort-green text-white py-16 px-6 text-center text-sm font-light tracking-wider">
    <div class="max-w-7xl mx-auto">
      <p id="footer-contact" class="text-white/80"></p>
      <p class="text-[10px] text-white/30 tracking-[0.2em] uppercase mt-12">&copy; 2026 Collective Luxury Architecture. Securely Delivered.</p>
    </div>
  </footer>

  <script>
    async function loadHotelData() {
      try {
        const response = await fetch('/homepage.json');
        const data = await response.json();

        // Inject Core Identity / Hero Details
        document.getElementById('hotel-name').innerText = data.hotel_name || "Boutique Resort";
        document.getElementById('nav-logo').innerText = data.hotel_name || "Resort";
        document.getElementById('hero-headline').innerText = data.hero_headline || "";
        
        if(data.hero_image) {
          document.getElementById('hero').style.backgroundImage = `url('${data.hero_image}')`;
        } else {
          document.getElementById('hero').style.backgroundImage = `url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80')`;
        }
        if(data.booking_url) {
          document.getElementById('booking-btn').href = data.booking_url;
        }

        // Render Editorial Copy
        document.getElementById('intro-text').innerHTML = `&ldquo;${data.intro_text || ""}&rdquo;`;

        // Render Luxury Amenities Dynamic Grid
        const amenitiesContainer = document.getElementById('amenities-container');
        amenitiesContainer.innerHTML = (data.amenities || []).map(amenity => `
          <div class="text-center p-10 bg-white border border-neutral-100/30 shadow-xs hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
            <h3 class="font-serif text-xl text-resort-green mb-3 font-normal">${amenity.title}</h3>
            <p class="text-sm text-neutral-500 leading-relaxed">${amenity.description}</p>
          </div>
        `).join('');

        // Render Luxury Rooms Portfolio
        const roomsContainer = document.getElementById('rooms-container');
        roomsContainer.innerHTML = (data.rooms || []).map(room => `
          <div class="bg-white flex flex-col group shadow-xs hover:shadow-2xl transition-all duration-500">
            <div class="w-full h-80 overflow-hidden relative">
              <img src="${room.photo || 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=800&q=80'}" alt="${room.room_name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
            </div>
            <div class="p-8 flex-grow flex flex-col justify-between border border-t-0 border-neutral-100">
              <div>
                <div class="flex justify-between items-baseline mb-4 border-b border-neutral-100 pb-4">
                  <h3 class="font-serif text-2xl text-resort-green font-normal">${room.room_name}</h3>
                  <span class="text-base text-resort-gold font-medium whitespace-nowrap ml-2">THB ${room.price} <span class="text-xs text-neutral-400 font-light">/ night</span></span>
                </div>
                <p class="text-sm text-neutral-500 leading-relaxed mb-6">${room.description || ''}</p>
              </div>
              <div class="text-[10px] text-neutral-400 font-medium uppercase tracking-wider">Accommodates up to ${room.guests || 2} Guests</div>
            </div>
          </div>
        `).join('');

        // Setup Clean Footer Contact Links
        document.getElementById('footer-contact').innerHTML = `
          T: ${data.phone || ''} &nbsp;&middot;&nbsp; E: ${data.email || ''}
        `;

      } catch (error) {
        console.error("Pipeline Sync Error:", error);
      }
    }

    window.addEventListener('DOMContentLoaded', loadHotelData);
  </script>

</body>
</html>
